name: "LiteFS Node B"

on:
  workflow_dispatch:

env:
  IMAGE_NAME: litefs-node
  CONTAINER_NAME: litefs-node-b

jobs:
  run-node:
    name: "Node B — Run & Monitor"
    runs-on: ubuntu-latest
    timeout-minutes: 50

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -f docker/Dockerfile -t $IMAGE_NAME:latest .
          echo "✓ Image built"

      - name: Start Node B container
        env:
          TS_AUTHKEY: ${{ secrets.TS_AUTHKEY }}
        run: |
          NODE_NAME="node-b-${{ github.run_number }}"
          echo "NODE_NAME=$NODE_NAME" >> $GITHUB_ENV

          docker run -d \
            --name "$CONTAINER_NAME" \
            --privileged \
            --env TS_AUTHKEY="$TS_AUTHKEY" \
            --env TS_TAGS="tag:litefs-node" \
            --env NODE_NAME="$NODE_NAME" \
            $IMAGE_NAME:latest

          echo "✓ Container started: $CONTAINER_NAME (node: $NODE_NAME)"

      - name: "Wait for bootstrap (75s)"
        run: |
          # Node B cần thêm thời gian hơn A để join cluster
          echo "Waiting 75s for bootstrap + cluster join..."
          for i in $(seq 1 15); do
            sleep 5
            echo -n "  ${i}0s... "
            STATUS=$(docker exec $CONTAINER_NAME consul members 2>/dev/null | wc -l || echo "0")
            echo "Consul members: $((STATUS - 1))"
          done

      - name: Show bootstrap logs
        if: always()
        run: docker logs $CONTAINER_NAME 2>&1 | tail -60

      - name: "Verify 1: Joined cluster + replication check"
        run: |
          echo "=== Node B Initial Verification ==="
          docker exec $CONTAINER_NAME /usr/local/bin/verify.sh

          # Chứng minh cụ thể: Node B là REPLICA, đọc được data từ A
          echo ""
          echo "=== REPLICATION PROOF ==="
          echo "If heartbeats from node-a-* appear below, replication is working:"
          docker exec $CONTAINER_NAME sqlite3 /mnt/litefs/cluster.db \
            "SELECT node_name, node_ip, message, ts FROM heartbeats ORDER BY id DESC LIMIT 5;" \
            2>/dev/null || echo "(DB not yet synced from primary)"

      - name: "Keep node alive (35 min monitoring loop)"
        run: |
          echo "Node B will run for 35 minutes..."
          for i in $(seq 1 35); do
            echo ""
            echo "══════════════════════════════════════════"
            echo " Node B — Minute $i/35 — $(date -u '+%H:%M:%S UTC')"
            echo "══════════════════════════════════════════"

            echo "--- Consul members ---"
            docker exec $CONTAINER_NAME consul members 2>/dev/null || echo "unreachable"

            echo "--- LiteFS primary ---"
            docker exec $CONTAINER_NAME consul kv get litefs/primary 2>/dev/null || echo "(not set)"

            echo "--- DB (all writers, proves replication) ---"
            docker exec $CONTAINER_NAME sqlite3 /mnt/litefs/cluster.db \
              "SELECT node_name, node_ip, COUNT(*) as writes, MAX(ts) as last_write
               FROM heartbeats GROUP BY node_ip;" \
              2>/dev/null || echo "(DB not accessible)"

            sleep 60
          done

      - name: "Verify final"
        if: always()
        run: docker exec $CONTAINER_NAME /usr/local/bin/verify.sh || true

      - name: "Graceful shutdown"
        if: always()
        run: |
          echo "=== GRACEFUL SHUTDOWN ==="
          docker stop --time=20 $CONTAINER_NAME || true
          echo "✓ Node B stopped. Remaining nodes should maintain cluster."

      - name: Show final logs
        if: always()
        run: docker logs $CONTAINER_NAME 2>&1 | tail -30 || true
